services:
  # 1. Main Parent App (Landing + Proxy + Auth)
  - type: web
    name: parashari-parent-app
    env: node
    region: singapore
    plan: free
    rootDir: AB_AI
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false # Set securely in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false

  # 2. Learning Portal API (Courses + Streams)
  - type: web
    name: parashari-learning-api
    env: node
    region: singapore
    plan: free
    rootDir: learningPortal/server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5002
      - key: MONGODB_URI
        sync: false
      - key: USER_DB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      # Video Streaming & CORS Configurations
      - key: CLOUDFLARE_WORKER_URL
        sync: false
      - key: VIDEO_SIGNING_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: AB_AI_PRODUCTION_URL
        sync: false
